<div x-data="{
  rows: [
    { id: 1, ip: '209.42.7.35', type: 'Company (Corefinity)', accessType: 'SSH', addedBy: 'Catherine Jarosz', status: 'Running', comment: 'Test IP', createdAt: '2025-07-14 08:55:17' }
  ],
  nextId: 2,
  showAdd: false,
  editingId: null,
  form: { ip: '', type: 'Company (Corefinity)', accessType: 'SSH', addedBy: 'Current User', status: 'Running', comment: '' },
  editForm: { ip: '', type: 'Company (Corefinity)', accessType: 'SSH', addedBy: '', status: 'Running', comment: '' },
  isValidIpv4(ip) {
    const value = (ip || '').trim();
    const ipv4Pattern = /^(25[0-5]|2[0-4]\d|1\d{2}|[1-9]?\d)(\.(25[0-5]|2[0-4]\d|1\d{2}|[1-9]?\d)){3}$/;
    return ipv4Pattern.test(value);
  },
  isDuplicateIp(ip, ignoreId = null) {
    const value = (ip || '').trim();
    return this.rows.some((row) => row.id !== ignoreId && row.ip === value);
  },

  addRow() {
    const ip = this.form.ip.trim();
    if (!ip) {
      if (window.Alpine && this.$store && this.$store.toast) this.$store.toast.show('IP address is required');
      return;
    }
    if (!this.isValidIpv4(ip)) {
      if (window.Alpine && this.$store && this.$store.toast) this.$store.toast.show('Please enter a valid IPv4 address');
      return;
    }
    if (this.isDuplicateIp(ip)) {
      if (window.Alpine && this.$store && this.$store.toast) this.$store.toast.show('IP address already exists');
      return;
    }
    this.rows.push({
      id: this.nextId++,
      ip,
      type: this.form.type,
      accessType: this.form.accessType,
      addedBy: this.form.addedBy.trim() || 'Current User',
      status: this.form.status,
      comment: this.form.comment.trim() || '-',
      createdAt: new Date().toISOString().slice(0, 19).replace('T', ' ')
    });
    this.form = { ip: '', type: 'Company (Corefinity)', accessType: 'SSH', addedBy: 'Current User', status: 'Running', comment: '' };
    this.showAdd = false;
    if (window.Alpine && this.$store && this.$store.toast) this.$store.toast.show('IP rule saved');
  },

  startEdit(row) {
    this.editingId = row.id;
    this.editForm = {
      ip: row.ip,
      type: row.type,
      accessType: row.accessType,
      addedBy: row.addedBy,
      status: row.status,
      comment: row.comment === '-' ? '' : row.comment
    };
  },

  cancelEdit() {
    this.editingId = null;
  },

  saveEdit(id) {
    const ip = this.editForm.ip.trim();
    if (!ip) {
      if (window.Alpine && this.$store && this.$store.toast) this.$store.toast.show('IP address is required');
      return;
    }
    if (!this.isValidIpv4(ip)) {
      if (window.Alpine && this.$store && this.$store.toast) this.$store.toast.show('Please enter a valid IPv4 address');
      return;
    }
    if (this.isDuplicateIp(ip, id)) {
      if (window.Alpine && this.$store && this.$store.toast) this.$store.toast.show('IP address already exists');
      return;
    }
    const idx = this.rows.findIndex(r => r.id === id);
    if (idx === -1) return;
    this.rows[idx] = {
      ...this.rows[idx],
      ip,
      type: this.editForm.type,
      accessType: this.editForm.accessType,
      addedBy: this.editForm.addedBy.trim() || this.rows[idx].addedBy,
      status: this.editForm.status,
      comment: this.editForm.comment.trim() || '-'
    };
    this.editingId = null;
    if (window.Alpine && this.$store && this.$store.toast) this.$store.toast.show('IP rule updated');
  },

  deleteRow(id) {
    this.rows = this.rows.filter((row) => row.id !== id);
    if (this.editingId === id) this.editingId = null;
    if (window.Alpine && this.$store && this.$store.toast) this.$store.toast.show('IP rule deleted');
  }
}" class="space-y-8 px-6 py-5">
  <section>
    <h3 class="text-xl font-semibold text-corefinity-blue">Whitelisted IPs</h3>
    <p class="mt-1 text-sm text-text-secondary">You have granted network access only to these specific IP addresses.</p>

    <div class="mt-4 overflow-x-auto">
      <table class="min-w-[1080px] w-full text-sm">
        <thead class="bg-surface-bg text-[11px] uppercase tracking-[0.16em] text-corefinity-blue">
          <tr>
            <th class="px-3 py-3 text-left font-bold">IP</th>
            <th class="px-3 py-3 text-left font-bold">Type</th>
            <th class="px-3 py-3 text-left font-bold">Access Type</th>
            <th class="px-3 py-3 text-left font-bold">Added By</th>
            <th class="px-3 py-3 text-left font-bold">Status</th>
            <th class="px-3 py-3 text-left font-bold">Comment</th>
            <th class="px-3 py-3 text-left font-bold">Created At</th>
            <th class="px-3 py-3 text-left font-bold">Action</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-surface-border">
          <template x-for="row in rows" :key="row.id">
            <tr class="transition-colors hover:bg-surface-elevated/80">
              <td class="px-3 py-3 font-semibold text-corefinity-blue" x-show="editingId !== row.id" x-text="row.ip"></td>
              <td class="px-3 py-3" x-show="editingId === row.id" style="display:none"><input x-model="editForm.ip" type="text" class="cf-input h-9" /></td>

              <td class="px-3 py-3 text-text-secondary" x-show="editingId !== row.id" x-text="row.type"></td>
              <td class="px-3 py-3" x-show="editingId === row.id" style="display:none"><select x-model="editForm.type" class="cf-select h-9 min-w-[150px] py-1 text-sm"><option>Company (Corefinity)</option><option>Office</option><option>Personal</option></select></td>

              <td class="px-3 py-3 text-text-secondary" x-show="editingId !== row.id" x-text="row.accessType"></td>
              <td class="px-3 py-3" x-show="editingId === row.id" style="display:none"><select x-model="editForm.accessType" class="cf-select h-9 min-w-[120px] py-1 text-sm"><option>SSH</option><option>HTTP</option><option>HTTPS</option></select></td>

              <td class="px-3 py-3 text-text-secondary" x-show="editingId !== row.id" x-text="row.addedBy"></td>
              <td class="px-3 py-3" x-show="editingId === row.id" style="display:none"><input x-model="editForm.addedBy" type="text" class="cf-input h-9" /></td>

              <td class="px-3 py-3 text-text-secondary" x-show="editingId !== row.id" x-text="row.status"></td>
              <td class="px-3 py-3" x-show="editingId === row.id" style="display:none"><select x-model="editForm.status" class="cf-select h-9 min-w-[110px] py-1 text-sm"><option>Running</option><option>Pending</option></select></td>

              <td class="px-3 py-3 text-text-secondary" x-show="editingId !== row.id" x-text="row.comment"></td>
              <td class="px-3 py-3" x-show="editingId === row.id" style="display:none"><input x-model="editForm.comment" type="text" class="cf-input h-9" /></td>

              <td class="px-3 py-3 text-text-secondary" x-text="row.createdAt"></td>

              <td class="px-3 py-3 text-corefinity-cyan" x-show="editingId !== row.id">
                <div class="flex items-center gap-3">
                  <button type="button" @click="startEdit(row)" class="hover:underline">Edit</button>
                  <button type="button" @click="deleteRow(row.id)" class="text-red-500 hover:underline">Delete</button>
                </div>
              </td>
              <td class="px-3 py-3" x-show="editingId === row.id" style="display:none">
                <div class="flex items-center gap-2">
                  <button type="button" @click="saveEdit(row.id)" class="rounded-md bg-corefinity-orange px-3 py-1.5 text-xs font-semibold text-white hover:bg-[#e05e00]">Save</button>
                  <button type="button" @click="cancelEdit()" class="rounded-md border border-surface-border px-3 py-1.5 text-xs font-semibold text-text-secondary">Cancel</button>
                </div>
              </td>
            </tr>
          </template>

          <tr x-show="showAdd" style="display:none" class="bg-surface-bg/70">
            <td class="px-3 py-3"><input x-model="form.ip" type="text" placeholder="203.0.113.10" class="cf-input h-9" /></td>
            <td class="px-3 py-3"><select x-model="form.type" class="cf-select h-9 min-w-[150px] py-1 text-sm"><option>Company (Corefinity)</option><option>Office</option><option>Personal</option></select></td>
            <td class="px-3 py-3"><select x-model="form.accessType" class="cf-select h-9 min-w-[120px] py-1 text-sm"><option>SSH</option><option>HTTP</option><option>HTTPS</option></select></td>
            <td class="px-3 py-3"><input x-model="form.addedBy" type="text" class="cf-input h-9" /></td>
            <td class="px-3 py-3"><select x-model="form.status" class="cf-select h-9 min-w-[110px] py-1 text-sm"><option>Running</option><option>Pending</option></select></td>
            <td class="px-3 py-3"><input x-model="form.comment" type="text" placeholder="Comment" class="cf-input h-9" /></td>
            <td class="px-3 py-3 text-text-muted">Auto</td>
            <td class="px-3 py-3">
              <div class="flex items-center gap-2">
                <button type="button" @click="addRow()" class="rounded-md bg-corefinity-orange px-3 py-1.5 text-xs font-semibold text-white hover:bg-[#e05e00]">Save</button>
                <button type="button" @click="showAdd = false" class="rounded-md border border-surface-border px-3 py-1.5 text-xs font-semibold text-text-secondary">Cancel</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <section class="flex flex-wrap items-center gap-3">
    <p class="text-base font-medium text-corefinity-blue">Whitelist a new IP in Environment (Production Environment)</p>
    <button type="button" @click="showAdd = true" class="inline-flex items-center gap-2 rounded-lg bg-corefinity-orange px-4 py-2 text-sm font-semibold text-white hover:bg-[#e05e00]">
      <span class="inline-flex h-4 w-4 items-center justify-center rounded-full bg-white text-corefinity-orange">+</span>
      Add a new IP
    </button>
  </section>

  <p class="text-sm text-text-secondary">Only IPv4 addresses are supported at this time.</p>
</div>
