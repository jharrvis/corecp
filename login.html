<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Corefinity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/corefinity.css" />
  <style>
    body {
      font-family: Inter, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(1200px 600px at 10% -10%, rgba(15, 72, 138, 0.12), transparent 60%),
        radial-gradient(900px 500px at 100% 0%, rgba(0, 155, 222, 0.2), transparent 55%),
        linear-gradient(135deg, #eaf5ff, #d7eeff 55%, #c9e8ff 100%);
      color: #0b2540;
    }

    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-grid {
      width: min(1020px, 100%);
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      border: 1px solid rgba(15, 72, 138, 0.14);
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(14px);
      box-shadow: 0 30px 80px rgba(15, 72, 138, 0.18);
    }

    .login-hero {
      padding: 42px;
      background: linear-gradient(165deg, rgba(15, 72, 138, 0.08), rgba(15, 72, 138, 0.01));
      border-right: 1px solid rgba(15, 72, 138, 0.12);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: #0f488a;
      border: 1px solid rgba(15, 72, 138, 0.24);
      background: rgba(15, 72, 138, 0.08);
    }

    .hero-title {
      margin: 0;
      font-size: clamp(28px, 3vw, 40px);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .hero-subtitle {
      margin: 0;
      color: rgba(11, 37, 64, 0.78);
      font-size: 15px;
      line-height: 1.6;
      max-width: 44ch;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .hero-stat {
      border: 1px solid rgba(15, 72, 138, 0.14);
      border-radius: 12px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.64);
    }

    .hero-stat strong {
      display: block;
      font-size: 18px;
      margin-bottom: 3px;
    }

    .hero-stat span {
      font-size: 12px;
      color: rgba(11, 37, 64, 0.65);
    }

    .login-panel {
      background: #ffffff;
      color: #0b2540;
      padding: 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-heading {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    .login-caption {
      margin: 0 0 24px;
      color: #5a7898;
      font-size: 14px;
    }

    .login-form {
      display: grid;
      gap: 14px;
    }

    .login-label {
      font-size: 12px;
      font-weight: 600;
      color: #385978;
      margin-bottom: 6px;
      display: block;
    }

    .login-input {
      width: 100%;
      height: 44px;
      border-radius: 10px;
      border: 1px solid #c8dced;
      background: #f9fcff;
      padding: 0 13px;
      font: inherit;
      color: #0b2540;
      box-sizing: border-box;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    .login-input:focus {
      outline: none;
      border-color: #009bde;
      box-shadow: 0 0 0 3px rgba(0, 155, 222, 0.16);
      background: #fff;
    }

    .login-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: #5a7898;
    }

    .login-link {
      color: #0f488a;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link:hover {
      color: #009bde;
    }

    .login-submit {
      height: 46px;
      border: 0;
      border-radius: 10px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(90deg, #0f488a, #009bde);
      box-shadow: 0 10px 24px rgba(15, 72, 138, 0.28);
      transition: transform .15s ease, box-shadow .2s ease;
    }

    .login-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 28px rgba(15, 72, 138, 0.35);
    }

    .login-submit:active {
      transform: translateY(0);
    }

    @media (max-width: 920px) {
      .login-grid {
        grid-template-columns: 1fr;
      }

      .login-hero {
        border-right: 0;
      border-bottom: 1px solid rgba(15, 72, 138, 0.12);
      }

      .login-panel,
      .login-hero {
        padding: 26px;
      }
    }
  </style>
</head>

<body>
  <main class="login-shell">
    <section class="login-grid" aria-label="Login">
      <aside class="login-hero">
        <div>
          <img src="assets/img/logo.svg" alt="Corefinity" style="height:34px;width:auto;display:block;margin-bottom:16px;" />
          <span class="hero-badge">Corefinity Control Panel</span>
          <h1 class="hero-title">Manage your infrastructure in one place.</h1>
          <p class="hero-subtitle">Securely access environments, deployments, diagnostics, and quick actions from a modern control center.</p>
        </div>

        <div class="hero-stats">
          <div class="hero-stat">
            <strong>99.95%</strong>
            <span>Platform uptime</span>
          </div>
          <div class="hero-stat">
            <strong>120+</strong>
            <span>Managed services</span>
          </div>
        </div>
      </aside>

      <div class="login-panel">
        <h2 class="login-heading">Sign In</h2>
        <p class="login-caption">Use your account to continue to Corefinity.</p>

        <form class="login-form" action="user-profile.html" method="get">
          <div>
            <label class="login-label" for="email">Email Address</label>
            <input class="login-input" id="email" name="email" type="email" required placeholder="you@example.com" />
          </div>

          <div>
            <label class="login-label" for="password">Password</label>
            <input class="login-input" id="password" name="password" type="password" required placeholder="Enter your password" />
          </div>

          <div class="login-row">
            <label><input type="checkbox" /> Remember me</label>
            <a class="login-link" href="#">Forgot password?</a>
          </div>

          <button class="login-submit" type="submit">Sign In</button>
        </form>
      </div>
    </section>
  </main>
</body>

</html>
