<div>
  <div class="border-b border-surface-border bg-surface-bg/70 px-6 py-4">
    <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
      <div>
        <p class="text-xs font-bold uppercase tracking-wider text-corefinity-blue">Nodes</p>
        <h3 class="mt-1 text-lg font-bold text-text-primary">Cluster Nodes</h3>
        <p class="mt-1 text-sm text-text-secondary">Compute capacity and health for the nodes serving this environment.</p>
      </div>
      <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
        <div class="relative w-full sm:w-64">
          <svg class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-corefinity-cyan" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <path stroke-linecap="round" d="M21 21l-4.35-4.35" />
          </svg>
          <input type="search" placeholder="Search nodes" class="cf-input pl-10 text-sm" />
        </div>
        <span class="inline-flex items-center gap-2 rounded-full bg-green-500/10 px-3 py-2 text-xs font-semibold text-green-600 whitespace-nowrap">
          <span class="h-2 w-2 rounded-full bg-green-500"></span>
          Updated 30s ago
        </span>
      </div>
    </div>
  </div>

  <div class="overflow-x-auto">
    <table class="min-w-[1180px] w-full text-sm">
      <thead class="bg-surface-bg text-[11px] uppercase tracking-[0.16em] text-corefinity-blue">
        <tr>
          <th class="px-6 py-3 text-left font-bold">Name</th>
          <th class="px-4 py-3 text-left font-bold">Internal IP</th>
          <th class="px-4 py-3 text-left font-bold">External IP</th>
          <th class="px-4 py-3 text-left font-bold">Version</th>
          <th class="px-4 py-3 text-left font-bold">Kernel Version</th>
          <th class="px-4 py-3 text-left font-bold">CPU</th>
          <th class="px-4 py-3 text-left font-bold">Memory</th>
          <th class="px-4 py-3 text-left font-bold">Status</th>
          <th class="px-4 py-3 text-right font-bold">View</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-surface-border">
        <template x-for="node in nodes" :key="node.name">
          <tr class="transition-colors hover:bg-surface-elevated/80">
            <td class="px-6 py-4 font-semibold text-corefinity-blue" x-text="node.name"></td>
            <td class="px-4 py-4 text-corefinity-blue" x-text="node.internalIp"></td>
            <td class="px-4 py-4 text-text-secondary" x-text="node.externalIp"></td>
            <td class="px-4 py-4 text-text-secondary" x-text="node.version"></td>
            <td class="px-4 py-4 text-text-secondary" x-text="node.kernelVersion"></td>
            <td class="px-4 py-4 text-text-secondary" x-text="node.cpu"></td>
            <td class="px-4 py-4 text-text-secondary" x-text="node.memory"></td>
            <td class="px-4 py-4">
              <span class="inline-flex items-center gap-2 text-green-600">
                <span class="inline-flex h-5 w-5 items-center justify-center rounded-full border border-green-200 bg-green-500/10">
                  <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                  </svg>
                </span>
                Healthy
              </span>
            </td>
            <td class="px-4 py-4 text-right">
              <button type="button" class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-transparent text-corefinity-cyan transition-colors hover:border-surface-border hover:bg-surface-bg" :aria-label="'View node ' + node.name">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M1.5 12s3.5-7 10.5-7 10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <div class="flex items-center justify-between gap-3 border-t border-surface-border px-6 py-4 text-sm">
    <button type="button" class="font-semibold text-text-muted transition-colors hover:text-text-secondary">Previous</button>
    <p class="text-text-muted">1-5 of 11</p>
    <button type="button" class="font-semibold text-corefinity-orange transition-colors hover:text-[#e05e00]">Next</button>
  </div>
</div>
