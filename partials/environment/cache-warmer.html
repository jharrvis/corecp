<div x-data="{
  cacheEnabled: true,
  sitemapManualMode: false,
  sitemapUrl: '',
  runState: 'idle',
  runTimer: null,
  errorMessage: 'Unable to find a suitable sitemap in robots.txt file. Please switch to manual mode and enter your sitemap URL to activate the cache warmer.',
  runNow() {
    if (this.runTimer) {
      window.clearTimeout(this.runTimer);
      this.runTimer = null;
    }
    this.runState = 'running';
    this.runTimer = window.setTimeout(() => {
      this.runState = 'error';
      this.runTimer = null;
      if (window.Alpine && this.$store && this.$store.toast) {
        this.$store.toast.show('Cache warmer check failed');
      }
    }, 1200);
  }
}" class="space-y-8 px-6 py-5">
  <section class="space-y-2">
    <p class="text-xs font-bold uppercase tracking-wider text-corefinity-blue">Status</p>
    <div class="flex items-center gap-3 text-sm">
      <button type="button" role="switch" :aria-checked="cacheEnabled.toString()" @click="cacheEnabled = !cacheEnabled"
        class="relative inline-flex h-7 w-12 items-center rounded-full transition-colors"
        :class="cacheEnabled ? 'bg-corefinity-cyan' : 'bg-surface-border'">
        <span class="inline-block h-5 w-5 transform rounded-full bg-white shadow transition-transform"
          :class="cacheEnabled ? 'translate-x-6' : 'translate-x-1'"></span>
      </button>
      <span class="font-semibold" :class="cacheEnabled ? 'text-corefinity-cyan' : 'text-text-muted'" x-text="cacheEnabled ? 'Enabled' : 'Disabled'"></span>
    </div>
  </section>

  <section class="space-y-3">
    <div class="flex flex-wrap items-center justify-between gap-3">
      <div class="space-y-2">
        <p class="text-xs font-bold uppercase tracking-wider text-corefinity-blue">Sitemaps</p>
        <div class="flex items-center gap-3 text-sm">
          <span class="font-medium" :class="!sitemapManualMode ? 'text-corefinity-cyan' : 'text-text-muted'">Auto Generated</span>
          <button type="button" role="switch" :aria-checked="sitemapManualMode.toString()" @click="sitemapManualMode = !sitemapManualMode"
            class="relative inline-flex h-7 w-12 items-center rounded-full transition-colors"
            :class="sitemapManualMode ? 'bg-corefinity-orange' : 'bg-surface-border'">
            <span class="inline-block h-5 w-5 transform rounded-full bg-white shadow transition-transform"
              :class="sitemapManualMode ? 'translate-x-6' : 'translate-x-1'"></span>
          </button>
          <span class="font-medium" :class="sitemapManualMode ? 'text-corefinity-orange' : 'text-text-muted'">Manual Mode</span>
        </div>

        <div x-show="sitemapManualMode" style="display:none" class="pt-1">
          <input x-model="sitemapUrl" type="text" placeholder="https://example.com/sitemap.xml" class="cf-input h-9 min-w-[320px]" />
        </div>
      </div>

      <button type="button" @click="runNow()" :disabled="runState === 'running'"
        class="rounded-md px-3 py-1.5 text-sm font-semibold transition-colors"
        :class="runState === 'running' ? 'cursor-not-allowed bg-surface-elevated text-text-muted' : 'text-corefinity-orange hover:text-[#e05e00]'"
        x-text="runState === 'running' ? 'Running...' : 'Run now'"></button>
    </div>

    <div x-show="runState === 'error'" style="display:none" class="rounded-lg border border-surface-border bg-surface-bg px-4 py-3 text-sm text-text-secondary" x-text="errorMessage"></div>
  </section>

  <section class="space-y-3">
    <p class="text-xs font-bold uppercase tracking-wider text-corefinity-blue">Cache warming schedule</p>
    <div class="flex flex-wrap items-center justify-end gap-2 text-sm text-text-secondary">
      <span>Between</span>
      <select class="cf-select h-9 min-w-[84px] py-1 text-sm">
        <option>1:00</option>
        <option>2:00</option>
        <option>3:00</option>
      </select>
      <span>and</span>
      <select class="cf-select h-9 min-w-[84px] py-1 text-sm">
        <option>6:00</option>
        <option>7:00</option>
        <option>8:00</option>
      </select>
      <button type="button" @click="runNow()" class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-corefinity-orange text-white transition-colors hover:bg-[#e05e00]" aria-label="Run cache warmer">
        <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z" />
        </svg>
      </button>
    </div>
  </section>
</div>
