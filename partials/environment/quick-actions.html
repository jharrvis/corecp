<div x-data="{
  actions: [
    'Restart Web Pods',
    'Restart Database Pods',
    'Restart Redis Pods',
    'Restart RabbitMQ Pods',
    'Restart Elastic Search Pods',
    'Restart Cli',
    'Restart Varnish'
  ],
  showModal: false,
  currentAction: '',
  progress: 0,
  phase: 1,
  transferLogs: [],
  configLogs: [],
  timer: null,
  transferFiles: [
    'build/app/assets/javascripts/cable.js',
    'build/app/assets/stylesheets/application.css',
    'build/app/channels/application_cable/channel.rb',
    'build/app/channels/application_cable/connection.rb',
    'build/config/environment/production.rb',
    'build/config/routes.rb'
  ],
  configFiles: [
    'build/config/database.yml',
    'build/config/redis.yml',
    'build/config/puma.rb'
  ],
  startRun(actionName) {
    this.resetSimulation();
    this.currentAction = actionName;
    this.showModal = true;
    this.timer = window.setInterval(() => {
      if (this.phase === 1) {
        if (this.transferLogs.length < this.transferFiles.length) {
          this.transferLogs.push('Uploading ' + this.transferFiles[this.transferLogs.length]);
          this.progress = Math.min(75, this.progress + 12);
          return;
        }
        this.phase = 2;
      }
      if (this.phase === 2) {
        if (this.configLogs.length < this.configFiles.length) {
          this.configLogs.push('Uploading ' + this.configFiles[this.configLogs.length]);
          this.progress = Math.min(100, this.progress + 9);
          return;
        }
        this.progress = 100;
        this.stopSimulation();
        if (window.Alpine && this.$store && this.$store.toast) {
          this.$store.toast.show(actionName + ' completed');
        }
      }
    }, 550);
  },
  stopSimulation() {
    if (!this.timer) return;
    window.clearInterval(this.timer);
    this.timer = null;
  },
  closeModal() {
    this.stopSimulation();
    this.showModal = false;
  },
  resetSimulation() {
    this.stopSimulation();
    this.progress = 0;
    this.phase = 1;
    this.transferLogs = [];
    this.configLogs = [];
  }
}" class="divide-y divide-surface-border">
  <template x-for="actionName in actions" :key="actionName">
    <div class="grid grid-cols-[1fr_auto] items-center px-6 py-4 transition-colors hover:bg-surface-elevated">
      <span class="text-sm text-corefinity-blue" x-text="actionName"></span>
      <button type="button" @click="startRun(actionName)"
        class="min-w-[52px] rounded-md bg-corefinity-orange px-4 py-1.5 text-sm font-semibold text-white hover:bg-[#e05e00]">Run</button>
    </div>
  </template>

  <div x-show="showModal" style="display:none"
    class="fixed inset-0 z-[70] flex items-center justify-center bg-black/40 p-4" @keydown.escape.window="closeModal()"
    @click.self="closeModal()">
    <div class="w-full max-w-4xl rounded-2xl border border-surface-border bg-surface-card shadow-2xl">
      <div class="border-b border-surface-border px-6 py-4">
        <div class="flex items-center justify-between gap-4">
          <div>
            <h3 class="text-xl font-bold text-text-primary">Transferring files</h3>
            <p class="mt-1 text-xs text-text-secondary" x-text="currentAction"></p>
          </div>
          <button type="button" @click="closeModal()"
            class="rounded-md border border-surface-border px-3 py-1.5 text-xs font-semibold text-text-secondary hover:bg-surface-elevated">Close</button>
        </div>
        <div class="mt-4 h-3 w-full rounded-full bg-surface-elevated">
          <div class="h-3 rounded-full bg-corefinity-cyan transition-all duration-300"
            :style="'width:' + progress + '%'" role="progressbar" :aria-valuenow="progress" aria-valuemin="0"
            aria-valuemax="100"></div>
        </div>
      </div>

      <div class="max-h-52 overflow-y-auto">
        <template x-if="transferLogs.length === 0">
          <div class="border-b border-surface-border px-6 py-4 text-sm text-text-secondary">Starting transfer...</div>
        </template>
        <template x-for="line in transferLogs" :key="line">
          <div class="border-b border-surface-border px-6 py-3 text-sm text-text-primary" x-text="line"></div>
        </template>
      </div>

      <div class="border-t border-surface-border px-6 py-4">
        <h4 class="text-2xl font-bold text-text-primary">Uploading config files</h4>
        <div class="mt-3 max-h-36 overflow-y-auto rounded-lg border border-surface-border bg-surface-bg/60">
          <template x-if="configLogs.length === 0">
            <div class="px-4 py-3 text-sm text-text-muted">Waiting for transfer stage...</div>
          </template>
          <template x-for="line in configLogs" :key="line">
            <div class="border-b border-surface-border px-4 py-3 text-sm text-text-primary last:border-b-0"
              x-text="line"></div>
          </template>
        </div>
      </div>
    </div>
  </div>
</div>
